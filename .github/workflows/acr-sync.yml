name: Sync CIS-Hardened Images from GHCR to ACR

# Images are already built and hardened (and CIS-gated) by build.yml. This
# workflow simply mirrors the already-hardened base images from GHCR to ACR,
# re-verifying them with the CIS gate before publishing. It does NOT re-harden
# at runtime (the old `docker commit` approach has been removed).

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  GHCR_REGISTRY: ghcr.io
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          chmod +x scripts/generate-github-matrix.sh
          {
            echo "matrix<<EOF"
            ./scripts/generate-github-matrix.sh json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  sync-base-images:
    runs-on: ubuntu-latest
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Pull hardened base image from GHCR
        run: docker pull ${{ env.REGISTRY }}/${{ matrix.os }}-hardened:${{ matrix.version }}
      - name: CIS gate before publishing to ACR (hard fail)
        run: ./scripts/cis-verify.sh ${{ env.REGISTRY }}/${{ matrix.os }}-hardened:${{ matrix.version }}
      - name: Retag and push to ACR
        run: |
          docker tag ${{ env.REGISTRY }}/${{ matrix.os }}-hardened:${{ matrix.version }} \
            ${{ env.ACR_REGISTRY }}/${{ matrix.os }}-hardened:${{ matrix.version }}
          docker push ${{ env.ACR_REGISTRY }}/${{ matrix.os }}-hardened:${{ matrix.version }}
