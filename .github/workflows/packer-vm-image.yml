name: Build CIS-Hardened Azure VM Images (Packer)

on:
  workflow_dispatch:
    inputs:
      os:
        description: "OS to build (debian, redhat, windows)"
        required: true
        type: choice
        options: [debian, redhat, windows]
        default: debian
      min_cis_score:
        description: "Minimum OpenSCAP CIS score required to pass (Linux only)"
        required: false
        type: string
        default: "70"

permissions:
  contents: read

jobs:
  build-vm-image:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Initialise Packer plugins
        working-directory: packer
        run: packer init "${{ github.event.inputs.os }}.pkr.hcl"

      - name: Build & CIS-harden VM image with Packer
        working-directory: packer
        env:
          PKR_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          PKR_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          PKR_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          PKR_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          PKR_VAR_min_cis_score: ${{ github.event.inputs.min_cis_score }}
          # Windows-only: local admin password for the transient build VM.
          PKR_VAR_admin_password: ${{ secrets.WINDOWS_ADMIN_PASSWORD }}
        run: |
          mkdir -p reports
          # The OpenSCAP CIS remediation+scoring gate runs INSIDE this build
          # (Linux). If the image scores below PKR_VAR_min_cis_score the
          # provisioner exits non-zero and `packer build` fails here.
          packer build "${{ github.event.inputs.os }}.pkr.hcl"

      - name: Upload CIS compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cis-report-${{ github.event.inputs.os }}
          path: packer/reports/
          if-no-files-found: ignore

      - name: Publish image to Azure Shared Image Gallery
        # Only reached when the Packer build (incl. the CIS gate) succeeded.
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          echo "Image '${{ github.event.inputs.os }}-hardened-*' built and passed the CIS gate."
          echo "Wire up 'az sig image-version create' here with your gallery/definition."
