name: Golden Image Build, CIS-Verify and Publish

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR (after they pass the CIS gate)"
        type: boolean
        default: true
      platforms:
        description: "Target platforms for the published multi-arch images"
        type: string
        default: "linux/amd64,linux/arm64"
      publish_latest:
        description: "Also tag as latest (main only)"
        type: boolean
        default: false
      build_scope:
        description: "What to build"
        type: choice
        options:
          - all
          - base-only
          - platform-only
        default: all

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: golden-image-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}
  # CIS gate thresholds (consumed by scripts/cis-verify.sh)
  DOCKLE_EXIT_LEVEL: warn
  TRIVY_SEVERITY: HIGH,CRITICAL

jobs:
  # ---------------------------------------------------------------------------
  # Dockerfile CIS build-practice gate (trivy config). Runs first; the whole
  # pipeline is blocked if any Dockerfile violates the CIS Docker build checks.
  # ---------------------------------------------------------------------------
  dockerfile-cis-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Lint Dockerfiles (CIS Docker build checks)
        run: ./scripts/lint-dockerfiles.sh

  # ---------------------------------------------------------------------------
  # Base OS images: build (amd64, loaded) -> CIS gate -> push multi-arch.
  # The image is NEVER pushed unless it passes the Trivy CIS gate.
  # ---------------------------------------------------------------------------
  generate-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          chmod +x scripts/generate-github-matrix.sh
          {
            echo "matrix<<EOF"
            ./scripts/generate-github-matrix.sh json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-base-images:
    runs-on: ubuntu-latest
    needs: [generate-matrix, dockerfile-cis-lint]
    timeout-minutes: 60
    if: ${{ inputs.build_scope == 'all' || inputs.build_scope == 'base-only' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Build base image (amd64, loaded) for the CIS gate
        run: |
          docker buildx build --load \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --build-arg VERSION=1.0.0 \
            -f base-images/${{ matrix.os }}/Dockerfile.${{ matrix.version }} \
            -t gate/${{ matrix.os }}-hardened:${{ matrix.version }} \
            --cache-from type=gha,scope=${{ matrix.os }}-${{ matrix.version }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.os }}-${{ matrix.version }} \
            .
      - name: CIS gate — Dockle + Trivy (hard fail)
        run: ./scripts/cis-verify.sh gate/${{ matrix.os }}-hardened:${{ matrix.version }}
      - name: Log in to GHCR
        if: ${{ inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Build & push base image (multi-arch) — only after passing the gate
        if: ${{ inputs.push_images }}
        run: |
          EXTRA=""
          if [ "${{ inputs.publish_latest }}" = "true" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            EXTRA="-t ${REGISTRY}/${{ matrix.os }}-hardened:latest"
          fi
          docker buildx build --push \
            --platform "${{ inputs.platforms }}" \
            --provenance=true --sbom=true \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --build-arg VERSION=1.0.0 \
            -f base-images/${{ matrix.os }}/Dockerfile.${{ matrix.version }} \
            -t ${REGISTRY}/${{ matrix.os }}-hardened:${{ matrix.version }} \
            -t ${REGISTRY}/${{ matrix.os }}-hardened:${IMAGE_TAG} \
            $EXTRA \
            --cache-from type=gha,scope=${{ matrix.os }}-${{ matrix.version }} \
            .

  # ---------------------------------------------------------------------------
  # Platform images that build directly on an OS base.
  # Pulls the hardened base from GHCR, gates the platform, then pushes it.
  # (Runs only when pushing, so the hardened base is available in the registry.)
  # ---------------------------------------------------------------------------
  build-platform-images:
    runs-on: ubuntu-latest
    needs: build-base-images
    timeout-minutes: 90
    if: ${{ inputs.push_images && (inputs.build_scope == 'all' || inputs.build_scope == 'platform-only') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: nginx
            base_os: alpine
            base_version: "3.20"
          - platform: python
            base_os: alpine
            base_version: "3.20"
          - platform: openjdk
            base_os: debian
            base_version: "12"
          - platform: aspnet
            base_os: debian
            base_version: "12"
          - platform: dotnet
            base_os: debian
            base_version: "12"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Build platform image (amd64, loaded) for the CIS gate
        run: |
          docker buildx build --load \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --build-arg VERSION=1.0.0 \
            --build-arg BASE_IMAGE=${REGISTRY}/${{ matrix.base_os }}-hardened:${{ matrix.base_version }} \
            -f platform-images/${{ matrix.platform }}/Dockerfile \
            -t gate/${{ matrix.platform }}-platform:${IMAGE_TAG} \
            --cache-from type=gha,scope=${{ matrix.platform }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.platform }} \
            .
      - name: CIS gate — Dockle + Trivy (hard fail)
        run: ./scripts/cis-verify.sh gate/${{ matrix.platform }}-platform:${IMAGE_TAG}
      - name: Build & push platform image (multi-arch) — only after passing the gate
        run: |
          EXTRA=""
          if [ "${{ inputs.publish_latest }}" = "true" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            EXTRA="-t ${REGISTRY}/${{ matrix.platform }}-platform:latest"
          fi
          docker buildx build --push \
            --platform "${{ inputs.platforms }}" \
            --provenance=true --sbom=true \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --build-arg VERSION=1.0.0 \
            --build-arg BASE_IMAGE=${REGISTRY}/${{ matrix.base_os }}-hardened:${{ matrix.base_version }} \
            -f platform-images/${{ matrix.platform }}/Dockerfile \
            -t ${REGISTRY}/${{ matrix.platform }}-platform:${IMAGE_TAG} \
            -t ${REGISTRY}/${{ matrix.platform }}-platform:${{ matrix.platform }}-${{ matrix.base_os }}-${{ matrix.base_version }} \
            $EXTRA \
            --cache-from type=gha,scope=${{ matrix.platform }} \
            .

  # ---------------------------------------------------------------------------
  # JVM-derived platforms (Tomcat, Spring Boot) build on the openjdk-platform
  # image produced above, so they run in a second stage.
  # ---------------------------------------------------------------------------
  build-jvm-platform-images:
    runs-on: ubuntu-latest
    needs: build-platform-images
    timeout-minutes: 60
    if: ${{ inputs.push_images && (inputs.build_scope == 'all' || inputs.build_scope == 'platform-only') }}
    strategy:
      fail-fast: false
      matrix:
        platform: [tomcat, springboot]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Build JVM platform image (amd64, loaded) for the CIS gate
        run: |
          docker buildx build --load \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --build-arg VERSION=1.0.0 \
            --build-arg BASE_IMAGE=${REGISTRY}/openjdk-platform:${IMAGE_TAG} \
            -f platform-images/${{ matrix.platform }}/Dockerfile \
            -t gate/${{ matrix.platform }}-platform:${IMAGE_TAG} \
            --cache-from type=gha,scope=${{ matrix.platform }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.platform }} \
            .
      - name: CIS gate — Dockle + Trivy (hard fail)
        run: ./scripts/cis-verify.sh gate/${{ matrix.platform }}-platform:${IMAGE_TAG}
      - name: Build & push JVM platform image (multi-arch) — only after passing the gate
        run: |
          docker buildx build --push \
            --platform "${{ inputs.platforms }}" \
            --provenance=true --sbom=true \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --build-arg VERSION=1.0.0 \
            --build-arg BASE_IMAGE=${REGISTRY}/openjdk-platform:${IMAGE_TAG} \
            -f platform-images/${{ matrix.platform }}/Dockerfile \
            -t ${REGISTRY}/${{ matrix.platform }}-platform:${IMAGE_TAG} \
            --cache-from type=gha,scope=${{ matrix.platform }} \
            .

  # ---------------------------------------------------------------------------
  # Publish the full vulnerability/CIS report to the GitHub Security tab.
  # ---------------------------------------------------------------------------
  security-report:
    runs-on: ubuntu-latest
    needs: [build-base-images]
    if: ${{ always() && inputs.push_images }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Scan published base images and upload SARIF
        run: |
          ./scripts/generate-github-matrix.sh scanning | awk '/-/{print $2}' | while read -r image; do
            ref="${REGISTRY}/$(basename "$image")"
            echo "Scanning $ref ..."
            trivy image --severity HIGH,CRITICAL --format sarif \
              --output "trivy-$(basename "$image" | tr ':/' '--').sarif" "$ref" || true
          done
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'
